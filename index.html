<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendFive</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header>
<h1>TrendFive</h1>
<div>
<input id="search" placeholder="Search products">
<button id="darkModeBtn">🌙</button>
<div class="cart">🛒 <span id="cart-count">0</span></div>
</div>
</header>

<!-- Categories -->
<section class="categories">
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('Makeup')">Makeup</button>
<button onclick="filterProducts('Electronics')">Electronics</button>
<button onclick="filterProducts('Kitchen')">Kitchen</button>
<button onclick="filterProducts('Fashion')">Fashion</button>
<button onclick="filterProducts('Home')">Home & Living</button>
<button onclick="filterProducts('Sports')">Sports</button>
<button onclick="filterProducts('Gadgets')">Gadgets</button>
</section>

<!-- Hero -->
<section class="hero">
<div class="hero-overlay">
<h2>Discover Amazing Deals!</h2>
<p>Electronics, Makeup, Home, Fashion & More!</p>
<button>Shop Now</button>
</div>
</section>

<!-- Trending Products Slider -->
<section class="slider">
<h2>🔥 Trending Products</h2>
<div id="slider-container"></div>
</section>

<!-- Products -->
<section class="products">
<h2>Products</h2>
<div id="product-list"></div>
</section>

<!-- Limited Deal -->
<section class="deal">
<h2>🔥 Limited Deal</h2>
<p id="timer"></p>
</section>

<!-- Particles.js -->
<div id="particles-js"></div>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script src="script.js"></script>
</body>
</html>
